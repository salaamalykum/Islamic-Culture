name: Weekly Content Heartbeat
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate STATS.md
        run: |
          ARTICLE_COUNT=$(find content/ -name '*.md' | wc -l)
          TOTAL_BYTES=$(du -sb content/ | cut -f1)
          TOPICS=$(grep -rh '^topics:' content/ | sort -u | head -20)
          LATEST=$(ls -t content/ | head -10)
          
          cat > STATS.md << EOF
          # 📊 Islamic Culture Dataset - Weekly Stats
          
          **Last Updated**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Total Articles**: ${ARTICLE_COUNT}
          **Total Size**: ${TOTAL_BYTES} bytes
          **Dataset Health**: ✅ Active
          
          ## Latest Updated Articles
          ${LATEST}
          
          ## Topic Coverage
          ${TOPICS}
          
          ---
          *Auto-generated by GitHub Actions Heartbeat*
          EOF
          
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add STATS.md
          git diff --cached --quiet || git commit -m "chore(stats): weekly heartbeat $(date +%Y-W%V)"
          git push
